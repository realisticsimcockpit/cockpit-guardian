name: Feature request
description: Suggest an improvement for Cockpit Guardian.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What cockpit setup problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - USB Health
        - Restore
        - Joystick Order
        - SimHub
        - Arduino or ESP
        - Windows installer
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
