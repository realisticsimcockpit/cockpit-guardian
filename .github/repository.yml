repository:
  name: cockpit-guardian
  description: Windows cockpit readiness guardian for simracing rigs.
  homepage: https://github.com/realisticsimcockpit/cockpit-guardian
  topics: simracing, cockpit, windows, usb, directinput, serial, simhub, pyside6
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews: null
      required_status_checks:
        strict: true
        contexts:
          - Tests
      enforce_admins: false
      restrictions: null
